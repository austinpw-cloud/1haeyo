<svg width="100%" viewBox="0 0 680 345.31" role="img" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">1haeyo primary logo</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo for 1haeyo showing the number 1 as a brand mark with the wordmark beside it</desc>

<!-- Brand mark: the "1" in a rounded square with a location/person dot -->
<rect x="120" y="60" width="120" height="120" rx="28" fill="#FF6B35" style="fill:rgb(255, 107, 53);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="180" y="148" text-anchor="middle" dominant-baseline="central" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="-2" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Arial, sans-serif;font-size:72px;font-weight:800;text-anchor:middle;dominant-baseline:central">1</text>
<!-- Location dot above the 1 — represents "here, now, ready" -->
<circle cx="180" cy="78" r="8" fill="#FFFFFF" opacity="0.9" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="180" cy="78" r="3.5" fill="#FF6B35" style="fill:rgb(255, 107, 53);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Wordmark -->
<text x="264" y="108" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="48" font-weight="700" fill="var(--color-text-primary)" letter-spacing="-1" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Arial, sans-serif;font-size:48px;font-weight:700;text-anchor:start;dominant-baseline:auto">haeyo</text>

<!-- Tagline -->
<text x="264" y="148" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="15" font-weight="400" fill="var(--color-text-secondary)" letter-spacing="0.5" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Arial, sans-serif;font-size:15px;font-weight:400;text-anchor:start;dominant-baseline:auto">원하는 순간, 바로 일해요</text>

<!-- Divider -->
<line x1="120" y1="220" x2="560" y2="220" stroke="var(--color-border-tertiary)" stroke-width="0.5" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.15);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

